<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment | The Abundance Code</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Cinzel:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Cinzel', 'serif'],
                    },
                    colors: {
                        cosmic: {
                            950: '#06010D',
                            900: '#0E0320',
                            800: '#1A063C',
                            700: '#2A0A5E'
                        },
                        gold: {
                            200: '#FEF0C7',
                            300: '#FDE08B',
                            400: '#F6C358',
                            500: '#D99B28',
                            600: '#B2761A'
                        },
                        mystic: {
                            glow: '#9D4EDD',
                            teal: '#2DD4BF'
                        }
                    },
                    animation: {
                        'float': 'float 8s ease-in-out infinite',
                        'float-delayed': 'float 8s ease-in-out 4s infinite',
                        'pulse-glow': 'pulse-glow 4s ease-in-out infinite',
                        'spin-slow': 'spin 40s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: 0.3, transform: 'scale(1)' },
                            '50%': { opacity: 0.6, transform: 'scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #06010D;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Noise Texture */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Gradients */
        .bg-gradient-gold {
            background: linear-gradient(135deg, #FDE08B 0%, #D99B28 50%, #B2761A 100%);
        }

        /* Quiz Option Button Styles */
        .quiz-option {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .quiz-option:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(217, 155, 40, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px -5px rgba(217, 155, 40, 0.1);
        }

        .quiz-option.selected {
            background: rgba(217, 155, 40, 0.15);
            border-color: #F6C358;
            box-shadow: 0 0 20px rgba(217, 155, 40, 0.2);
            transform: scale(0.99);
        }

        .quiz-option.selected .check-circle {
            background-color: #F6C358;
            border-color: #F6C358;
        }

        .quiz-option.selected .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        .quiz-option.faded {
            opacity: 0.4;
            pointer-events: none;
            transform: scale(0.98);
        }

        /* Reveal Animations */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
        .delay-600 { animation-delay: 600ms; }
    </style>
</head>
<body class="antialiased selection:bg-gold-500 selection:text-cosmic-950 flex flex-col min-h-screen">

    <!-- Film Grain Overlay -->
    <div class="noise-overlay"></div>

    <!-- Animated Cosmic Background (Subtle version for quiz focus) -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-cosmic-800 via-cosmic-950 to-cosmic-950"></div>
        
        <!-- Subtle Glowing Orbs -->
        <div class="absolute top-[-20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-mystic-glow/10 blur-[120px] animate-float"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-mystic-teal/5 blur-[150px] animate-float-delayed"></div>
        
        <!-- Very faint sacred geometry -->
        <div class="absolute top-[50%] left-[50%] w-[100vw] h-[100vw] md:w-[60vw] md:h-[60vw] rounded-full border border-gold-500/5 animate-spin-slow" style="transform: translate(-50%, -50%);"></div>
    </div>

    <!-- Header & Progress Bar -->
    <header class="relative z-10 w-full pt-6 pb-4 px-6 md:px-12">
        <div class="max-w-3xl mx-auto flex flex-col items-center gap-6">
            <!-- Minimal Logo -->
            <div class="flex items-center gap-3">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-gold-400">
                    <path d="M12 4C5.5 4 1.5 12 1.5 12C1.5 12 5.5 20 12 20C18.5 20 22.5 12 22.5 12C22.5 12 18.5 4 12 4Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M12 8C14.2091 8 16 9.79086 16 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span class="font-sans text-xs md:text-sm font-medium tracking-[0.25em] text-white/80 uppercase">
                    The Abundance Code
                </span>
            </div>

            <!-- Progress Bar Container -->
            <div class="w-full flex flex-col gap-2">
                <div class="flex justify-between items-end px-1">
                    <span class="text-[10px] sm:text-xs font-sans tracking-widest text-mystic-teal uppercase font-semibold">
                        Progress
                    </span>
                    <span class="text-[10px] sm:text-xs font-sans tracking-widest text-gold-300 uppercase">
                        Question 1 of 8
                    </span>
                </div>
                <!-- Track -->
                <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
                    <!-- Fill (Starts at 0, animates to 12.5% on load) -->
                    <div id="progressBar" class="h-full bg-gradient-gold rounded-full w-0 transition-all duration-1000 ease-out"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Quiz Content -->
    <main class="relative z-10 flex-grow flex flex-col items-center justify-center px-4 sm:px-6 py-8 w-full">
        
        <div class="w-full max-w-2xl mx-auto relative">
            
            <!-- Question Header -->
            <div class="text-center mb-8 sm:mb-10 px-2">
                <h1 class="reveal delay-100 font-serif text-2xl sm:text-3xl md:text-4xl lg:text-5xl text-white mb-4 leading-tight drop-shadow-lg">
                    "When it comes to abundance, I choose to..."
                </h1>
                <p class="reveal delay-200 text-sm sm:text-base md:text-lg text-slate-300 font-light">
                    Select what resonates most with your deepest desires right now
                </p>
            </div>

            <!-- Options Container -->
            <div class="flex flex-col gap-3 sm:gap-4 w-full">
                
                <!-- Option 1 -->
                <button class="quiz-option reveal delay-300 group w-full p-4 sm:p-5 rounded-2xl border border-white/10 glass-panel flex items-center text-left gap-4 sm:gap-5" onclick="selectAnswer(this)">
                    <div class="text-2xl sm:text-3xl shrink-0 drop-shadow-md">💎</div>
                    <div class="flex-grow font-sans text-sm sm:text-base text-slate-200 group-hover:text-white transition-colors leading-snug font-medium">
                        I choose to experience complete financial freedom and never worry about money again
                    </div>
                    <div class="check-circle w-6 h-6 sm:w-7 sm:h-7 rounded-full border-2 border-white/20 flex items-center justify-center shrink-0 transition-all duration-300 group-hover:border-gold-500/50">
                        <i data-lucide="check" class="check-icon w-3 h-3 sm:w-4 sm:h-4 text-cosmic-950 opacity-0 scale-50 transition-all duration-300"></i>
                    </div>
                </button>

                <!-- Option 2 -->
                <button class="quiz-option reveal delay-400 group w-full p-4 sm:p-5 rounded-2xl border border-white/10 glass-panel flex items-center text-left gap-4 sm:gap-5" onclick="selectAnswer(this)">
                    <div class="text-2xl sm:text-3xl shrink-0 drop-shadow-md">🌅</div>
                    <div class="flex-grow font-sans text-sm sm:text-base text-slate-200 group-hover:text-white transition-colors leading-snug font-medium">
                        I choose to have unlimited time to do what brings me joy and fulfillment
                    </div>
                    <div class="check-circle w-6 h-6 sm:w-7 sm:h-7 rounded-full border-2 border-white/20 flex items-center justify-center shrink-0 transition-all duration-300 group-hover:border-gold-500/50">
                        <i data-lucide="check" class="check-icon w-3 h-3 sm:w-4 sm:h-4 text-cosmic-950 opacity-0 scale-50 transition-all duration-300"></i>
                    </div>
                </button>

                <!-- Option 3 -->
                <button class="quiz-option reveal delay-500 group w-full p-4 sm:p-5 rounded-2xl border border-white/10 glass-panel flex items-center text-left gap-4 sm:gap-5" onclick="selectAnswer(this)">
                    <div class="text-2xl sm:text-3xl shrink-0 drop-shadow-md">🌟</div>
                    <div class="flex-grow font-sans text-sm sm:text-base text-slate-200 group-hover:text-white transition-colors leading-snug font-medium">
                        I choose to create a meaningful impact and leave a lasting legacy
                    </div>
                    <div class="check-circle w-6 h-6 sm:w-7 sm:h-7 rounded-full border-2 border-white/20 flex items-center justify-center shrink-0 transition-all duration-300 group-hover:border-gold-500/50">
                        <i data-lucide="check" class="check-icon w-3 h-3 sm:w-4 sm:h-4 text-cosmic-950 opacity-0 scale-50 transition-all duration-300"></i>
                    </div>
                </button>

                <!-- Option 4 -->
                <button class="quiz-option reveal delay-600 group w-full p-4 sm:p-5 rounded-2xl border border-white/10 glass-panel flex items-center text-left gap-4 sm:gap-5" onclick="selectAnswer(this)">
                    <div class="text-2xl sm:text-3xl shrink-0 drop-shadow-md">💕</div>
                    <div class="flex-grow font-sans text-sm sm:text-base text-slate-200 group-hover:text-white transition-colors leading-snug font-medium">
                        I choose to be surrounded by deep love and genuine connections
                    </div>
                    <div class="check-circle w-6 h-6 sm:w-7 sm:h-7 rounded-full border-2 border-white/20 flex items-center justify-center shrink-0 transition-all duration-300 group-hover:border-gold-500/50">
                        <i data-lucide="check" class="check-icon w-3 h-3 sm:w-4 sm:h-4 text-cosmic-950 opacity-0 scale-50 transition-all duration-300"></i>
                    </div>
                </button>

            </div>

        </div>
    </main>

    <!-- Bottom Spacing -->
    <div class="h-12 w-full"></div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Animate progress bar on load (12.5% for Question 1 of 8)
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.getElementById('progressBar').style.width = '12.5%';
            }, 300);
        });

        // Handle Option Selection
        function selectAnswer(selectedButton) {
            const allOptions = document.querySelectorAll('.quiz-option');
            
            // 1. Remove event listeners & add appropriate classes
            allOptions.forEach(btn => {
                btn.onclick = null; // Prevent double clicking
                if(btn === selectedButton) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.add('faded');
                }
            });

            // 2. Visual feedback processing state
            // (Optional: swap checkmark for a loading spinner after a tiny delay)
            setTimeout(() => {
                const iconContainer = selectedButton.querySelector('.check-circle');
                iconContainer.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 text-cosmic-950 animate-spin"></i>`;
                lucide.createIcons();
            }, 400);

            // 3. Auto-advance to next question
            setTimeout(() => {
                // In a real application, this would route to step 2 or update the DOM.
                // We'll simulate it with an alert for demonstration purposes.
                alert("Choice recorded. Advancing to Question 2...");
                
                // Example route change:
                // window.location.href = 'quiz-step-2.html';
                
            }, 800);
        }
    </script>
</body>
</html>
