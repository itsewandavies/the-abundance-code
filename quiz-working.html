<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment | The Abundance Code</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Cinzel:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Cinzel', 'serif'],
                    },
                    colors: {
                        cosmic: {
                            950: '#06010D',
                            900: '#0E0320',
                            800: '#1A063C',
                            700: '#2A0A5E'
                        },
                        gold: {
                            200: '#FEF0C7',
                            300: '#FDE08B',
                            400: '#F6C358',
                            500: '#D99B28',
                            600: '#B2761A'
                        },
                        mystic: {
                            glow: '#9D4EDD',
                            teal: '#2DD4BF'
                        }
                    },
                    animation: {
                        'float': 'float 8s ease-in-out infinite',
                        'float-delayed': 'float 8s ease-in-out 4s infinite',
                        'pulse-glow': 'pulse-glow 4s ease-in-out infinite',
                        'spin-slow': 'spin 40s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: 0.3, transform: 'scale(1)' },
                            '50%': { opacity: 0.6, transform: 'scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #06010D;
            color: #ffffff;
            overflow-x: hidden;
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .bg-gradient-gold {
            background: linear-gradient(135deg, #FDE08B 0%, #D99B28 50%, #B2761A 100%);
        }

        .quiz-option.selected .check-circle {
            background: #FDE08B;
            border-color: #D99B28;
        }

        .quiz-option.selected .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        .quiz-option.faded {
            opacity: 0.3;
            pointer-events: none;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        .delay-100 { transition-delay: 100ms; }
        .delay-200 { transition-delay: 200ms; }
        .delay-300 { transition-delay: 300ms; }
        .delay-400 { transition-delay: 400ms; }
        .delay-500 { transition-delay: 500ms; }
        .delay-600 { transition-delay: 600ms; }

        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body class="antialiased selection:bg-gold-500 selection:text-cosmic-950 min-h-screen flex flex-col">

    <!-- Film Grain Overlay -->
    <div class="noise-overlay"></div>

    <!-- Animated Cosmic Background -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-cosmic-800 via-cosmic-950 to-cosmic-950"></div>
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-900/20 blur-[120px] animate-float"></div>
        <div class="absolute bottom-[-20%] right-[-15%] w-[40vw] h-[40vw] rounded-full bg-gold-400/10 blur-[100px] animate-float-delayed"></div>
        <div class="absolute top-[40%] right-[70%] w-[25vw] h-[25vw] rounded-full bg-mystic-teal/15 blur-[80px] animate-pulse-glow"></div>
    </div>

    <!-- Progress Header -->
    <header class="relative z-20 w-full pt-4 sm:pt-6">
        <div class="w-full max-w-4xl mx-auto px-4 sm:px-6">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center space-x-3">
                    <div class="w-6 h-6 sm:w-8 sm:h-8 border-2 border-gold-300 rotate-45 shadow-lg shadow-gold-500/20"></div>
                    <span class="font-serif font-bold text-base sm:text-xl tracking-wide text-gold-300">THE ABUNDANCE CODE</span>
                </div>
                <div class="text-right">
                    <div class="text-xs sm:text-sm text-slate-400 font-medium">Question <span id="currentStep">1</span> of 8</div>
                </div>
            </div>
            <div class="flex items-center gap-3 text-xs sm:text-sm text-slate-400 font-medium">
                <span>Progress</span>
                <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-gradient-gold rounded-full transition-all duration-1000 ease-out" style="width: 12.5%"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Quiz Steps -->
    
    <!-- Step 1 -->
    <div class="step active" id="step1">
        <main class="relative z-10 flex-grow flex flex-col items-center justify-center px-4 sm:px-6 py-8 w-full">
            <div class="w-full max-w-2xl mx-auto relative">
                <div class="text-center mb-8 sm:mb-10 px-2">
                    <h1 class="reveal delay-100 active font-serif text-2xl sm:text-3xl md:text-4xl lg:text-5xl text-white mb-4 leading-tight drop-shadow-lg">
                        "When it comes to abundance, I choose to..."
                    </h1>
                    <p class="reveal delay-200 active text-sm sm:text-base md:text-lg text-slate-300 font-light">
                        Select what resonates most with your deepest desires right now
                    </p>
                </div>

                <div class="flex flex-col gap-3 sm:gap-4 w-full">
                    <button class="quiz-option reveal delay-300 active group w-full p-4 sm:p-5 rounded-2xl border border-white/10 glass-panel flex items-center text-left gap-4 sm:gap-5" onclick="selectAnswer(this, 'wealth_freedom')">
                        <div class="text-2xl sm:text-3xl shrink-0 drop-shadow-md">💎</div>
                        <div class="flex-grow font-sans text-sm sm:text-base text-slate-200 group-hover:text-white transition-colors leading-snug font-medium">
                            I choose to experience complete financial freedom and never worry about money again
                        </div>
                        <div class="check-circle w-6 h-6 sm:w-7 sm:h-7 rounded-full border-2 border-white/20 flex items-center justify-center shrink-0 transition-all duration-300 group-hover:border-gold-500/50">
                            <i data-lucide="check" class="check-icon w-3 h-3 sm:w-4 sm:h-4 text-cosmic-950 opacity-0 scale-50 transition-all duration-300"></i>
                        </div>
                    </button>

                    <button class="quiz-option reveal delay-400 active group w-full p-4 sm:p-5 rounded-2xl border border-white/10 glass-panel flex items-center text-left gap-4 sm:gap-5" onclick="selectAnswer(this, 'time_freedom')">
                        <div class="text-2xl sm:text-3xl shrink-0 drop-shadow-md">🌅</div>
                        <div class="flex-grow font-sans text-sm sm:text-base text-slate-200 group-hover:text-white transition-colors leading-snug font-medium">
                            I choose to have unlimited time to do what brings me joy and fulfillment
                        </div>
                        <div class="check-circle w-6 h-6 sm:w-7 sm:h-7 rounded-full border-2 border-white/20 flex items-center justify-center shrink-0 transition-all duration-300 group-hover:border-gold-500/50">
                            <i data-lucide="check" class="check-icon w-3 h-3 sm:w-4 sm:h-4 text-cosmic-950 opacity-0 scale-50 transition-all duration-300"></i>
                        </div>
                    </button>

                    <button class="quiz-option reveal delay-500 active group w-full p-4 sm:p-5 rounded-2xl border border-white/10 glass-panel flex items-center text-left gap-4 sm:gap-5" onclick="selectAnswer(this, 'impact_legacy')">
                        <div class="text-2xl sm:text-3xl shrink-0 drop-shadow-md">🌟</div>
                        <div class="flex-grow font-sans text-sm sm:text-base text-slate-200 group-hover:text-white transition-colors leading-snug font-medium">
                            I choose to create a meaningful impact and leave a lasting legacy
                        </div>
                        <div class="check-circle w-6 h-6 sm:w-7 sm:h-7 rounded-full border-2 border-white/20 flex items-center justify-center shrink-0 transition-all duration-300 group-hover:border-gold-500/50">
                            <i data-lucide="check" class="check-icon w-3 h-3 sm:w-4 sm:h-4 text-cosmic-950 opacity-0 scale-50 transition-all duration-300"></i>
                        </div>
                    </button>

                    <button class="quiz-option reveal delay-600 active group w-full p-4 sm:p-5 rounded-2xl border border-white/10 glass-panel flex items-center text-left gap-4 sm:gap-5" onclick="selectAnswer(this, 'love_connection')">
                        <div class="text-2xl sm:text-3xl shrink-0 drop-shadow-md">💕</div>
                        <div class="flex-grow font-sans text-sm sm:text-base text-slate-200 group-hover:text-white transition-colors leading-snug font-medium">
                            I choose to be surrounded by deep love and genuine connections
                        </div>
                        <div class="check-circle w-6 h-6 sm:w-7 sm:h-7 rounded-full border-2 border-white/20 flex items-center justify-center shrink-0 transition-all duration-300 group-hover:border-gold-500/50">
                            <i data-lucide="check" class="check-icon w-3 h-3 sm:w-4 sm:h-4 text-cosmic-950 opacity-0 scale-50 transition-all duration-300"></i>
                        </div>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Step 8 (Results) -->
    <div class="step" id="step8">
        <main class="relative z-10 flex-grow flex flex-col items-center justify-center px-4 sm:px-6 py-8 w-full">
            <div class="w-full max-w-2xl mx-auto relative text-center">
                <div class="mb-8">
                    <div class="w-20 h-20 mx-auto bg-gradient-gold rounded-full flex items-center justify-center mb-6">
                        <i data-lucide="sparkles" class="w-10 h-10 text-cosmic-950"></i>
                    </div>
                    <h1 class="font-serif text-3xl sm:text-4xl md:text-5xl text-white mb-4 leading-tight drop-shadow-lg">
                        Your Personal Abundance Code
                    </h1>
                    <div class="font-serif text-6xl sm:text-8xl font-bold bg-gradient-to-r from-gold-300 via-gold-400 to-gold-500 bg-clip-text text-transparent mb-6" id="finalCode">
                        374
                    </div>
                    <p class="text-lg text-slate-300 mb-8">
                        This 3-digit code is your unique frequency signature for attracting abundance.
                    </p>
                    <div class="space-y-4">
                        <a href="thankyou.html" class="inline-block bg-gradient-gold text-cosmic-950 font-bold text-lg px-8 py-4 rounded-2xl hover:transform hover:scale-105 transition-all duration-300">
                            Get My Complete Analysis →
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Initialize
        lucide.createIcons();
        
        let currentStepNum = 1;
        let answers = {};

        function selectAnswer(selectedButton, answer) {
            const currentStep = document.querySelector(`.step.active`);
            const allOptions = currentStep.querySelectorAll('.quiz-option');
            
            // Store answer
            answers[`step${currentStepNum}`] = answer;
            
            // Disable all options
            allOptions.forEach(btn => {
                btn.onclick = null;
                if(btn === selectedButton) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.add('faded');
                }
            });

            // Visual feedback
            setTimeout(() => {
                const iconContainer = selectedButton.querySelector('.check-circle');
                iconContainer.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 text-cosmic-950 animate-spin"></i>`;
                lucide.createIcons();
            }, 400);

            // Advance to next step
            setTimeout(() => {
                nextStep();
            }, 1200);
        }

        function nextStep() {
            if (currentStepNum < 8) {
                // Hide current step
                document.getElementById(`step${currentStepNum}`).classList.remove('active');
                currentStepNum++;
                
                // For demo, we'll skip to results after step 1
                if (currentStepNum === 2) {
                    currentStepNum = 8;
                }
                
                // Show next step
                document.getElementById(`step${currentStepNum}`).classList.add('active');
                
                // Update progress
                updateProgress();
                
                // Generate final code if on results
                if (currentStepNum === 8) {
                    generateFinalCode();
                }
            }
        }

        function updateProgress() {
            const progress = (currentStepNum / 8) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('currentStep').textContent = currentStepNum;
        }

        function generateFinalCode() {
            // Simple code generation based on answers
            const codes = [374, 528, 741, 639, 396, 417, 285, 963, 852, 174];
            const answerValue = answers.step1 || 'wealth_freedom';
            const hash = answerValue.split('').reduce((sum, char) => sum + char.charCodeAt(0), 0);
            const codeIndex = hash % codes.length;
            const finalCode = codes[codeIndex];
            
            document.getElementById('finalCode').textContent = finalCode;
        }
    </script>
</body>
</html>
